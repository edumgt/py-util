apiVersion: apps/v1
kind: Deployment
metadata:
  name: netapp
  namespace: netapp
  labels:
    app: netapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netapp
  template:
    metadata:
      labels:
        app: netapp
    spec:
      containers:
        - name: netapp
          # Image is pulled from the Harbor registry pod (NodePort 30500).
          # ${NODE_IP} is substituted at deploy time by infra/deploy-k8s-apps.sh
          # or by the GitHub Actions workflow using sed.
          image: ${NODE_IP}:30500/netapp/python-network-advanced:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: netapp
  namespace: netapp
spec:
  type: NodePort
  selector:
    app: netapp
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30800
